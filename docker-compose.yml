version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: volqan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: volqan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volqan-app
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/volqan
    ports:
      - "3000:3000"
    command: pnpm dev

volumes:
  postgres-data:
